# ============================================
# Professional tmux Configuration
# ============================================

# --- 基础设置 ---

# 前缀键改为 Ctrl+a（更顺手）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 真彩色支持
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 减少 escape 延迟（对 vim/neovim 用户至关重要）
set -sg escape-time 0

# 增大历史缓冲区
set -g history-limit 50000

# 窗口和面板编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 关闭窗口后自动重新编号
set -g renumber-windows on

# 启用鼠标支持（滚动、选择面板、调整大小）
set -g mouse on

# 使用 vi 模式
setw -g mode-keys vi

# 聚焦事件传递（neovim 需要）
set -g focus-events on

# --- 快捷键 ---

# 重新加载配置
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "Config reloaded!"

# 更直观的分屏快捷键
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新窗口保留当前路径
bind c new-window -c "#{pane_current_path}"

# vim 风格面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + 方向键切换面板（无需前缀）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift + 方向键切换窗口（无需前缀）
bind -n S-Left previous-window
bind -n S-Right next-window

# 面板大小调整（前缀 + HJKL）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 复制模式改进（vi 风格）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# 快速切换上一个窗口
bind Space last-window

# 鼠标点击状态栏左侧 session 名称 → 显示 session 列表
bind -n MouseDown1StatusLeft choose-tree -w

# 同步面板输入（广播模式）
bind S setw synchronize-panes \; display-message "Synchronize #{?synchronize-panes,ON,OFF}"

# 右键菜单
bind -n MouseDown3Pane display-menu -T "#[bold] Pane " -x M -y M \
  "─ Split"                                "" "" \
  "  ↔ Horizontal"                         h "split-window -h -c '#{pane_current_path}'" \
  "  ↕ Vertical"                           v "split-window -v -c '#{pane_current_path}'" \
  "" \
  "─ Toggle"                               "" "" \
  "#{?synchronize-panes,  ● Sync Panes,  ○ Sync Panes}" S "setw synchronize-panes" \
  "#{?window_zoomed_flag,  ● Zoom,  ○ Zoom}"             z "resize-pane -Z" \
  "" \
  "─ Move"                                 "" "" \
  "  ↑ Swap Up"                            u "swap-pane -U" \
  "  ↓ Swap Down"                          d "swap-pane -D" \
  "  ⎋ Break to Window"                    b "break-pane" \
  "  ⎘ Join from..."                       j "choose-window 'join-pane -s %%'" \
  "  → Send to..."                         s "choose-window 'join-pane -t %%'" \
  "" \
  "─ Layout"                               "" "" \
  "  ▦ Tiled"                              t "select-layout tiled" \
  "  ⬌ Even Horizontal"                    H "select-layout even-horizontal" \
  "  ⬍ Even Vertical"                      V "select-layout even-vertical" \
  "" \
  "─ Tools"                                "" "" \
  "  # Pane Numbers"                       q "display-panes" \
  "  ⌨ Key Bindings"                       k "list-keys" \
  "  ⏲ Clock"                              T "clock-mode" \
  "" \
  "─ Clipboard"                            "" "" \
  "  ≡ Choose Buffer"                      p "choose-buffer" \
  "" \
  "  ✕ Kill Pane"                          x "confirm-before -p 'Kill pane? (y/n)' kill-pane"

# 右键点击状态栏 → 窗口/Session 菜单
bind -n MouseDown3Status display-menu -T "#[bold] Window " -x M -y S \
  "─ Window"                               "" "" \
  "  + New Window"                         n "new-window -c '#{pane_current_path}'" \
  "  ✎ Rename Window"                      r "command-prompt -p 'Rename:' 'rename-window %%'" \
  "  ✕ Kill Window"                        x "confirm-before -p 'Kill window? (y/n)' kill-window" \
  "" \
  "─ Session"                              "" "" \
  "  ⇄ Switch Session"                     s "choose-tree -s" \
  "  + New Session"                        N "command-prompt -p 'Session name:' 'new-session -s %%'" \
  "  ✎ Rename Session"                     R "command-prompt -p 'Rename:' 'rename-session %%'" \
  "  ⏏ Detach"                             d "detach-client"

# --- 状态栏 ---

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 100

# --- 主题：自动检测 macOS Light/Dark ---

# 启动时自动检测并应用主题
run-shell "$XDG_CONFIG_HOME/tmux/apply-theme.sh"

# 手动切换主题快捷键
bind T run-shell "$XDG_CONFIG_HOME/tmux/apply-theme.sh" \; display-message "Theme refreshed!"

# --- 其他 ---

# attach/新建 session 时自动重新加载配置（同时刷新主题）
set-hook -g client-attached "source-file $XDG_CONFIG_HOME/tmux/tmux.conf"
set-hook -g session-created "source-file $XDG_CONFIG_HOME/tmux/tmux.conf ; send-keys 'source $XDG_CONFIG_HOME/tmux/cheatsheet.sh' Enter"

# 活动监控
setw -g monitor-activity on
set -g visual-activity off

# 后台窗口有活动时，加 bell 通知（终端会闪烁/发声）
set -g monitor-bell on
set -g visual-bell on
set -g bell-action other

# 把子进程从 tmux server 的 namespace 重新接入到当前用户的 Aqua session
if-shell "command -v reattach-to-user-namespace" "set-option -g default-command 'reattach-to-user-namespace -l ${SHELL}'"
