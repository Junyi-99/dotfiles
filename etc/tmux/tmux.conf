# ============================================================
# 基础设置
# ============================================================

# 真彩色支持
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 启用鼠标
set -g mouse on

# 从 1 开始编号（0 太远了）
set -g base-index 1
setw -g pane-base-index 1

# 窗口关闭后自动重新编号
set -g renumber-windows on

# 增大历史记录
set -g history-limit 50000

# 减少 escape 延迟（vim 用户必备）
set -sg escape-time 0

# 增大显示时间
set -g display-time 2000
set -g display-panes-time 2000

# 焦点事件（neovim 等需要）
set -g focus-events on

# 状态栏刷新间隔
set -g status-interval 5

# ============================================================
# 快捷键
# ============================================================

# 前缀键改为 C-a（更顺手）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# 分屏 - 用更直觉的键
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新窗口保持当前路径
bind c new-window -c "#{pane_current_path}"

# vim 风格的面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim 风格调整面板大小（大写重复）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 快速切换窗口
bind -r p previous-window
bind -r n next-window

# 同步面板
bind e setw synchronize-panes \; display "sync: #{?pane_synchronized,ON,OFF}"

# 点击 session 名弹出 session 列表
bind -T root MouseDown1StatusLeft choose-tree -s

# 复制模式用 vi 键位
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ============================================================
# 主题 - 自动检测 macOS 深色/浅色模式
# ============================================================

# 每次获得焦点时检测系统主题并应用
set-hook -g client-focus-in "run-shell '~/.config/tmux/apply-theme.sh'"

# 启动时也执行一次
run-shell '~/.config/tmux/apply-theme.sh'

# ============================================================
# 状态栏布局（颜色由 apply-theme.sh 设置）
# ============================================================

set -g status-position top
set -g status-justify left

# 左侧：session 名
set -g status-left-length 30
set -g status-left " #[bold]#{session_name} #[nobold]│ "

# 右侧：同步指示器 + 日期时间
set -g status-right-length 60
set -g status-right "#{?pane_synchronized,#[fg=red]SYNC ON │ ,} │ %m-%d %H:%M "

# 窗口格式
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-separator ""
